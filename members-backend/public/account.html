<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Beyond the Firewall — Account</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/members/account.css">
</head>
<body>
<main>
  <p class="status"><span class="dot"></span>Account</p>
  <h1><a href="/"><img src="/btf-logo-lockup.svg" alt="Beyond the Firewall" width="252" height="64"></a></h1>

  <p class="whoami" id="whoami"></p>

  <form id="displayname-form" novalidate>
    <label for="display-name">Display name</label>
    <input type="text" id="display-name" name="display-name" maxlength="100" placeholder="e.g. Stewart">

    <p class="error" id="displayname-error"></p>
    <p class="info" id="displayname-info"></p>

    <button type="submit" id="displayname-submit">Save name</button>
  </form>

  <form id="password-form" novalidate>
    <label for="current-password">Current password</label>
    <input type="password" id="current-password" name="current-password" autocomplete="current-password" required>

    <label for="new-password">New password</label>
    <input type="password" id="new-password" name="new-password" autocomplete="new-password" required minlength="6">

    <label for="confirm-password">Confirm new password</label>
    <input type="password" id="confirm-password" name="confirm-password" autocomplete="new-password" required minlength="6">

    <p class="error" id="account-error"></p>
    <p class="info" id="account-info"></p>

    <button type="submit" id="account-submit">Change password</button>
  </form>

  <p class="foot"><a href="/members/">Back to members area</a> &middot; <a href="/members/logout">Log out</a></p>
</main>
<script type="module" src="/members/dist/account.bundle.js"></script>
</body>
</html>
